name: Publish image-skill to ClawHub

on:
  workflow_dispatch:
    inputs:
      mode:
        description: What to run.
        type: choice
        required: true
        default: dry-run
        options: [dry-run, publish-single, publish-supported, publish-catalog]
      skill_path:
        description: Skill folder for publish-single.
        type: string
        required: false
        default: "skills/image-skill"
      tags:
        description: Optional comma-separated ClawHub tags for publish-single.
        type: string
        required: false
        default: "latest,image-generation,text-to-image,image-to-image,image-editing,video-generation,audio-generation,image-to-3d,creative-media,zero-setup"

permissions:
  contents: read
  id-token: write

jobs:
  dry-run:
    if: inputs.mode == 'dry-run'
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@main
    with: { owner: danielgwilson, dry_run: true }
    secrets: { clawhub_token: "${{ secrets.CLAWHUB_TOKEN }}" }

  publish-single:
    if: inputs.mode == 'publish-single'
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@main
    with:
      {
        owner: danielgwilson,
        skill_path: "${{ inputs.skill_path }}",
        tags: "${{ inputs.tags }}",
        dry_run: false,
      }
    secrets: { clawhub_token: "${{ secrets.CLAWHUB_TOKEN }}" }

  publish-supported:
    if: inputs.mode == 'publish-supported'
    strategy:
      fail-fast: false
      matrix:
        include:
          - skill_path: skills/image-skill
            tags: latest,image-generation,text-to-image,image-to-image,image-editing,video-generation,audio-generation,image-to-3d,creative-media,zero-setup
          - skill_path: skills/ai-audio-generation
            tags: latest,audio-generation,music-generation,sound-generation,creative-media,zero-setup
          - skill_path: skills/creative-media
            tags: latest,creative-media,image-generation,image-editing,video-generation,audio-generation,image-to-3d,zero-setup
          - skill_path: skills/image-to-3d
            tags: latest,image-to-3d,3d-generation,glb,creative-media,zero-setup
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@main
    with:
      {
        owner: danielgwilson,
        skill_path: "${{ matrix.skill_path }}",
        tags: "${{ matrix.tags }}",
        dry_run: false,
      }
    secrets: { clawhub_token: "${{ secrets.CLAWHUB_TOKEN }}" }

  publish-catalog:
    if: inputs.mode == 'publish-catalog'
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@main
    with: { owner: danielgwilson, dry_run: false }
    secrets: { clawhub_token: "${{ secrets.CLAWHUB_TOKEN }}" }
